<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Acceso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<header class="bg-white border-bottom sticky-top">
    <div class="container py-3 d-flex justify-content-between align-items-center">
      <h1 class="h4 m-0">Mi sitio</h1>
      <nav class="d-flex gap-3">
        <a href="index.html">Inicio</a>
        <a href="about.html">Acerca</a>
        <a href="contact.html">Contacto</a>
        <a href="tienda.html">Store</a>
      </nav>
    </div>
  </header>

<div class="container py-5">
  <h2 class="mb-4">Registro / Login</h2>

  <form id="authForm" class="mb-3">
    <input class="form-control mb-2" type="email" name="email" placeholder="Email" required>
    <input class="form-control mb-2" type="password" name="password" placeholder="Password" required>

    <button class="btn btn-success" type="submit">Registrarse</button>
    <button class="btn btn-dark" type="button" id="loginBtn">Entrar</button>
    <button class="btn btn-secondary" type="button" id="logoutBtn">Salir</button>
  </form>

  <div id="authStatus"></div>
  <div id="authUser" class="mt-2 text-muted"></div>
</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
