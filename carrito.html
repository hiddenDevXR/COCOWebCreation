<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Carrito</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
  <h2>Mi carrito</h2>

  <div id="cartStatus"></div>
  <div id="cartList"></div>
</div>

<script type="module">
  import { listenUserCart } from "./js/carrito.js";

  const list = document.getElementById("cartList");
  const status = document.getElementById("cartStatus");

  listenUserCart((items) => {
    if (items.length === 0) {
      status.innerHTML = "Carrito vacío o sin sesión";
      list.innerHTML = "";
      return;
    }

    status.innerHTML = "Productos: " + items.length;

    list.innerHTML = items.map(i => `
      <div class="border p-2 mb-2">
        <strong>${i.nombre}</strong>
        <div>$${i.precio}</div>
      </div>
    `).join("");
  });
</script>

</body>
</html>
